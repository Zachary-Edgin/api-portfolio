[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary of failures
addopts = -v --tb=short

# Markers
markers =
    auth: authentication and authorization tests
    suppliers: supplier resource tests
    items: item resource tests
    orders: order resource tests
    workflow: end-to-end workflow tests
