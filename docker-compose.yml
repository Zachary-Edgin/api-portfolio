services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    depends_on:
      app:
        condition: service_healthy
    environment:
      - ENV=local
    command: >
      pytest tests/ -v
      --html=artifacts/report.html
      --self-contained-html
      --junitxml=artifacts/results.xml
    volumes:
      - ./artifacts:/app/artifacts
